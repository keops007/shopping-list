services:
  db:
    image: mysql:8.0
    container_name: shoplist_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shoplist
      MYSQL_USER: shoplist
      MYSQL_PASSWORD: shoplist
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql

  app:
    build: .
    container_name: shoplist_api
    restart: always
    ports:
      - "8082:8081"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: shoplist
      DB_PASSWORD: shoplist
      DB_NAME: shoplist
      DB_PORT: 3306
      JWT_SECRET: 456546b5565465465465465
    volumes:
      - uploads:/app/uploads

volumes:
  dbdata:
  uploads:
